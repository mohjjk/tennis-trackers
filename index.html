<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tennis Tracker Application</h1>
    </header>
    <main>
        <section id="match-details">
            <h2>Match Details</h2>
            <form id="match-form">
                <label for="player1">Player 1:</label>
                <input type="text" id="player1" name="player1" required><br>
                <label for="player2">Player 2:</label>
                <input type="text" id="player2" name="player2" required><br>
                <label for="score1">Score Player 1:</label>
                <input type="number" id="score1" name="score1" min="0" required><br>
                <label for="score2">Score Player 2:</label>
                <input type="number" id="score2" name="score2" min="0" required><br>
                <button type="submit">Submit Match</button>
            </form>
        </section>
        <section id="match-results">
            <h2>Match Results</h2>
            <ul id="results-list"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
