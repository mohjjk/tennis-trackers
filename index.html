<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Tennis Tracker Application</h1>
    </header>
    <main>
        <section id="tracker">
            <h2>Match Tracker</h2>
            <form id="form">
                <label for="player1">Player 1:</label>
                <input type="text" id="player1" required>
                <label for="player2">Player 2:</label>
                <input type="text" id="player2" required>
                <button type="submit">Start Match</button>
            </form>
            <div id="scoreboard">
                <h3>Scoreboard</h3>
                <p>Player 1: <span id="score1">0</span></p>
                <p>Player 2: <span id="score2">0</span></p>
            </div>
            <button id="end-match">End Match</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Tennis Tracker</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
